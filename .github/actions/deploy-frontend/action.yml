name: Deploy Frontend
description: |
  Installs dependencies, builds the React app, syncs the build/ output to an S3
  bucket with correct cache headers, and invalidates CloudFront so the new version
  is served immediately.

  Called by dev.yml and prod.yml — each passes environment-specific values for the
  bucket name and distribution ID.

inputs:
  s3_bucket_name:
    required: true
    description: Name of the S3 bucket to sync the build into
  cloudfront_distribution_id:
    required: true
    description: CloudFront distribution ID to invalidate after the S3 sync

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: package-lock.json

    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Build
      shell: bash
      run: npm run build

    # Hashed static assets (JS, CSS, images) get a 1-year immutable cache.
    # index.html is excluded here so it gets its own no-cache header below.
    - name: Sync build/ to S3 (long-cache for hashed assets)
      shell: bash
      run: |
        aws s3 sync build/ s3://${{ inputs.s3_bucket_name }} \
          --delete \
          --exclude "index.html" \
          --cache-control "public, max-age=31536000, immutable"

    # index.html is the entry point that references hashed filenames.
    # It must never be cached so browsers always fetch the latest version.
    - name: Upload index.html (no-cache)
      shell: bash
      run: |
        aws s3 cp build/index.html s3://${{ inputs.s3_bucket_name }}/index.html \
          --cache-control "no-cache, no-store, must-revalidate" \
          --content-type "text/html"

    - name: Invalidate CloudFront cache
      shell: bash
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ inputs.cloudfront_distribution_id }} \
          --paths "/index.html"
