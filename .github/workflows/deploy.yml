name: Deploy Frontend

on:
  push:
    branches:
      - main

# ── Reusable deploy logic ──────────────────────────────────────────────────────
# Defined once here, called for dev then prod below. Both jobs share identical
# steps; only the secrets/environment differ.
jobs:

  # ── JOB 1: Deploy to Dev ─────────────────────────────────────────────────────
  deploy-dev:
    name: Build → S3 → CloudFront (dev)
    runs-on: ubuntu-24.04
    environment: dev                        # Pulls secrets from the "dev" GitHub Environment
    permissions:
      id-token: write                       # Required for OIDC token exchange
      contents: read

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5

      # ── 2. AWS credentials via OIDC (no long-lived keys in GitHub Secrets) ───
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN_DEV }}     # Dev IAM role ARN
          aws-region: eu-north-1

      # ── 3. Node.js + npm cache ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # ── 4. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 6. Sync hashed assets (JS/CSS/media) — safe to cache for 1 year ──────
      - name: Sync build/ to S3 (long-cache for hashed assets)
        run: |
          aws s3 sync build/ s3://${{ secrets.S3_BUCKET_NAME_DEV }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      # ── 7. Upload index.html with no-cache ────────────────────────────────────
      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp build/index.html s3://${{ secrets.S3_BUCKET_NAME_DEV }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # ── 8. Invalidate CloudFront ──────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DISTRIBUTION_ID_DEV }} \
            --paths "/index.html"


  # ── JOB 2: Deploy to Prod ─────────────────────────────────────────────────────
  # Only runs after dev succeeds. The "prod" GitHub Environment can also be
  # configured with a required reviewer for an extra manual approval gate.
  deploy-prod:
    name: Build → S3 → CloudFront (prod)
    runs-on: ubuntu-24.04
    needs: deploy-dev                       # Prod is blocked until dev is green
    environment: prod                       # Pulls secrets from the "prod" GitHub Environment
    permissions:
      id-token: write
      contents: read

    steps:
      # ── 1. Checkout ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5

      # ── 2. AWS credentials via OIDC ───────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.OIDC_ROLE_ARN }}     # Prod IAM role ARN
          aws-region: eu-north-1

      # ── 3. Node.js + npm cache ────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      # ── 4. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── 5. Build ──────────────────────────────────────────────────────────────
      - name: Build
        run: npm run build

      # ── 6. Sync hashed assets ─────────────────────────────────────────────────
      - name: Sync build/ to S3 (long-cache for hashed assets)
        run: |
          aws s3 sync build/ s3://${{ secrets.S3_BUCKET_NAME }} \
            --delete \
            --exclude "index.html" \
            --cache-control "public, max-age=31536000, immutable"

      # ── 7. Upload index.html with no-cache ────────────────────────────────────
      - name: Upload index.html (no-cache)
        run: |
          aws s3 cp build/index.html s3://${{ secrets.S3_BUCKET_NAME }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      # ── 8. Invalidate CloudFront ──────────────────────────────────────────────
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.DISTRIBUTION_ID }} \
            --paths "/index.html"
